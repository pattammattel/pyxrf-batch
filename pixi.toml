# PyXRF Batch Processing Environment
# 
# Setup Instructions:
# 1. Install dependencies: pixi install
# 2. Install PyXRF from git: pixi run install-pyxrf
# 3. Activate environment: pixi shell
#
# Note: PyXRF is installed separately with --no-deps to prevent
# its requirements.txt from overriding the exact versions pinned here.
# All PyXRF dependencies (atom, dask, h5py, etc.) are already managed below.

[project]
name = "pyxrf-batch"
version = "0.1.0"
description = "PyXRF batch processing with exact pinned versions"
authors = ["HXN Operator <xf03id@xf03idc-ws8.nsls2.bnl.local>"]
channels = ["conda-forge"]
platforms = ["linux-64"]

[tasks]
# Install PyXRF from git without dependencies (dependencies managed by pixi)
install-pyxrf = "pip install --no-deps git+https://github.com/pattammattel/PyXRF.git@master"

# Reinstall PyXRF (useful during development)
reinstall-pyxrf = "pip uninstall -y pyxrf && pip install --no-deps git+https://github.com/pattammattel/PyXRF.git@master"

[dependencies]
# Core Python and package management
python = "3.14.5"
pip = "26.1.1"
setuptools = "82.0.1"

# Scientific computing core
numpy = "2.4.6"
scipy = "1.17.1"
pandas = "3.0.3"
h5py = "3.16.0"
dask = "2026.3.0"
distributed = "2026.3.0"
xarray = "2026.4.0"

# Data visualization (pyqtgraph excluded due to packaging issues)
matplotlib = "3.10.9"

# Image processing
